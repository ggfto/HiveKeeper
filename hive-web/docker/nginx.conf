# Serves the console bundle and proxies its API calls to the gateway.
#
# The console calls the gateway under /gw (see src/api/gateway.js). In development that prefix is handled by
# the Vite dev server's proxy — which does not exist in production, so this file is the other half of the
# contract. Without it a built console 404s on every API call.
#
# HIVEKEEPER_GATEWAY_ORIGIN is substituted at container start (see the entrypoint in the Dockerfile), so one
# published image can point at whatever gateway the operator runs.

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Do not advertise the version to anyone scanning.
    server_tokens off;

    # The bundle's Content-Security-Policy is injected into index.html at build time (see vite.config.js).
    # These are the headers a static file server has to add itself.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # The gateway. /gw/api/x -> <gateway>/api/x — the prefix is stripped, exactly as the dev proxy does.
    location /gw/ {
        proxy_pass ${HIVEKEEPER_GATEWAY_ORIGIN}/;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Job progress streams over Server-Sent Events. nginx buffers proxied responses by default, which would
        # hold every progress event until the job finished — turning a live progress bar into a result screen.
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;

        # Applying a config to a fleet can outlast the default 60s read timeout. The gateway's own async
        # timeout is 120s, so let it be the one that decides.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Hashed assets are immutable; index.html must never be cached, or a browser keeps loading the previous
    # release's bundle after an upgrade.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-store";
    }

    # A single-page app: every route that is not a real file is served by index.html, so a deep link (or a
    # refresh on /devices/x) reaches the router instead of a 404.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
