# Postgres persistence profile: SPRING_PROFILES_ACTIVE=postgres
# The app connects as a RESTRICTED role (no RLS bypass); Flyway runs as an admin role to create the
# schema, RLS policies, and grants. Defaults point at the dev container on :5433.

# Re-enable the DB autoconfigs that the base profile excludes.
spring.autoconfigure.exclude=

spring.datasource.url=${HIVEKEEPER_DB_URL:jdbc:postgresql://localhost:5433/hivekeeper}
spring.datasource.username=${HIVEKEEPER_DB_USER:hivekeeper_app}
spring.datasource.password=${HIVEKEEPER_DB_PASSWORD:app}

# Flyway uses an admin role so it can own the tables and define RLS policies the app role cannot.
spring.flyway.url=${HIVEKEEPER_DB_URL:jdbc:postgresql://localhost:5433/hivekeeper}
spring.flyway.user=${HIVEKEEPER_DB_ADMIN_USER:postgres}
spring.flyway.password=${HIVEKEEPER_DB_ADMIN_PASSWORD:postgres}
spring.flyway.schemas=public

# At-rest encryption key for persisted job secrets (SSID passphrase, hive password) — base64 of 32 random
# bytes. REQUIRED: with no key the gateway refuses to start (no silent fallback). Generate + set in prod:
#   $env:HIVEKEEPER_CRYPTO_KEY = [Convert]::ToBase64String((1..32 | % {Get-Random -Max 256}))
hivekeeper.crypto.key=${HIVEKEEPER_CRYPTO_KEY:}
# Local-only escape hatch: run with a built-in INSECURE dev key instead of setting one. NEVER in prod.
hivekeeper.crypto.allow-insecure-dev-key=${HIVEKEEPER_CRYPTO_ALLOW_INSECURE_DEV_KEY:false}
