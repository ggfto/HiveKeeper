# mTLS profile: activate with SPRING_PROFILES_ACTIVE=mtls and point the keystore vars at dev-pki.
# client-auth=want so agents present a client cert (the handshake interceptor requires a valid,
# enrolled cert), while REST operators authenticate with X-Tenant-Key over TLS without a client cert.
server.port=9443
server.ssl.enabled=true
server.ssl.key-store=${HIVEKEEPER_TLS_KEYSTORE}
server.ssl.key-store-password=${HIVEKEEPER_TLS_KEYSTORE_PASSWORD:changeit}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=gateway
server.ssl.trust-store=${HIVEKEEPER_TLS_TRUSTSTORE}
server.ssl.trust-store-password=${HIVEKEEPER_TLS_TRUSTSTORE_PASSWORD:changeit}
server.ssl.trust-store-type=PKCS12
server.ssl.client-auth=want
