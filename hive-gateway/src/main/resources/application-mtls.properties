# mTLS profile: SPRING_PROFILES_ACTIVE=...,mtls
#
# This ADDS a TLS listener for agents (see AgentTlsConnector) — it does not replace the main HTTP port. The
# gateway ends up with two:
#
#   :8090  plain HTTP, internal only. The console's reverse proxy talks to it; no deployment publishes it.
#   :9443  TLS, client-auth=want. PUBLISHED. Agents connect here (wss://<host>:9443/agent).
#
# The agent port must NOT sit behind a TLS-terminating proxy. An agent authenticates with its client
# certificate, which the gateway reads from the TLS connection itself (the servlet's X509Certificate
# attribute), never from a header — so a proxy that terminates the handshake makes every agent handshake and
# certificate renewal fail closed. Publish this port directly.
#
# Generate a dev keystore/truststore with scripts/gen-dev-pki.ps1; in production these are created by
# scripts/init-secrets.sh and live in a volume.
hivekeeper.agent-tls.port=${HIVEKEEPER_AGENT_TLS_PORT:9443}
hivekeeper.agent-tls.keystore=${HIVEKEEPER_TLS_KEYSTORE}
hivekeeper.agent-tls.keystore-password=${HIVEKEEPER_TLS_KEYSTORE_PASSWORD:changeit}
hivekeeper.agent-tls.key-alias=${HIVEKEEPER_TLS_KEY_ALIAS:gateway}
hivekeeper.agent-tls.truststore=${HIVEKEEPER_TLS_TRUSTSTORE}
hivekeeper.agent-tls.truststore-password=${HIVEKEEPER_TLS_TRUSTSTORE_PASSWORD:changeit}
