# OIDC profile: SPRING_PROFILES_ACTIVE=postgres,oidc
# The gateway validates JWTs from this issuer (Keycloak in dev). The IdP only authenticates; org/site/group
# roles live in our database. Override the URLs for a real IdP via the env vars.
hivekeeper.oidc.issuer=${HIVEKEEPER_OIDC_ISSUER:http://localhost:8081/realms/hivekeeper}
hivekeeper.oidc.jwk-set-uri=${HIVEKEEPER_OIDC_JWK_SET_URI:http://localhost:8081/realms/hivekeeper/protocol/openid-connect/certs}
# Reject tokens not minted for this resource (audience confusion): a token is accepted only if its aud
# contains this value or its azp equals it. Defaults to the gateway client id (Keycloak always sets azp to
# the requesting client, so this works without an aud mapper; the realm also adds one for defense in depth).
# Set blank to disable the check.
hivekeeper.oidc.audience=${HIVEKEEPER_OIDC_AUDIENCE:hive-gateway}

# The public client the BROWSER uses for auth-code + PKCE. Handed to the console at runtime via /api/mode
# (together with the issuer above), so the published console image needs nothing baked in and works against
# whatever realm a self-hoster points it at.
hivekeeper.oidc.client-id=${HIVEKEEPER_OIDC_CLIENT_ID:hive-gateway}

# First-run setup creates the first admin in Keycloak via the Admin API. These are the operator's own Keycloak
# coordinates + admin credentials (dev defaults match scripts/dev-keycloak.ps1: admin/admin on the master realm).
hivekeeper.keycloak.base-url=${HIVEKEEPER_KEYCLOAK_BASE_URL:http://localhost:8081}
hivekeeper.keycloak.realm=${HIVEKEEPER_KEYCLOAK_REALM:hivekeeper}
hivekeeper.keycloak.admin-realm=${HIVEKEEPER_KEYCLOAK_ADMIN_REALM:master}
hivekeeper.keycloak.admin-client=${HIVEKEEPER_KEYCLOAK_ADMIN_CLIENT:admin-cli}
hivekeeper.keycloak.admin-username=${HIVEKEEPER_KEYCLOAK_ADMIN_USERNAME:admin}
hivekeeper.keycloak.admin-password=${HIVEKEEPER_KEYCLOAK_ADMIN_PASSWORD:admin}
