# Demo profile: LOCAL-DEV CONVENIENCE ONLY. Activate with SPRING_PROFILES_ACTIVE=...,demo
# It seeds public, well-known demo tenants/keys + identities so the local stack works out of the box.
# NEVER enable this in production — anyone could present X-Tenant-Key: acme-key and act as owner.
#
# In-memory mode reads this flag; the postgres mode applies the dev-only SQL seed via the extra Flyway location.
hivekeeper.demo-seed=true
spring.flyway.locations=classpath:db/migration,classpath:db/seed-dev
