# The cloud control plane (dev defaults to localhost). Agents connect to ws://<host>:8090/agent;
# browsers/operators hit the REST API on the same port. Put TLS + auth + multi-tenancy in front of this.
server.address=127.0.0.1
server.port=8090
spring.application.name=hivekeeper-gateway
spring.mvc.async.request-timeout=120000

# Spring Boot 4 flipped Jackson's FAIL_ON_NULL_FOR_PRIMITIVES default to true, which turns a request body that
# simply omits an optional primitive flag (e.g. SsidRequest.remove, ApplyConfigRequest.save) into a 400 instead
# of defaulting it to false. Restore the previous, lenient contract: an absent boolean/number means its default.
spring.jackson.deserialization.fail-on-null-for-primitives=false

# The X-Tenant-Key service-principal path: a static key authenticates as its tenant's configured role (default
# owner). It is checked before any user JWT. Set false to accept ONLY user JWTs -- recommended for a hardened
# OIDC deployment so a leaked/static key cannot bypass per-user authorization.
hivekeeper.tenantkey.enabled=${HIVEKEEPER_TENANTKEY_ENABLED:true}

# --- Health and metrics --------------------------------------------------------------------------------
# Served on their own port, which NO deployment publishes: health and metrics are for the orchestrator and the
# monitoring stack on the internal network, never for the internet. Keeping them off the public :8090 means a
# hardened deployment does not have to remember to block /actuator at the proxy.
#
#   /actuator/health             overall (used by the container HEALTHCHECK)
#   /actuator/health/liveness    is the process wedged?  (restart it)
#   /actuator/health/readiness   can it serve?           (send it traffic; includes the DB under 'postgres')
#   /actuator/prometheus         metrics to scrape
management.server.port=${HIVEKEEPER_MANAGEMENT_PORT:9091}
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.probes.enabled=true
# Never break down WHY it is unhealthy on an unauthenticated endpoint — component detail names the database,
# its host, and its failure mode.
management.endpoint.health.show-details=never
management.endpoint.health.show-components=never
# Email is an OPTIONAL alert channel, not a dependency. The mail starter auto-registers a MailHealthIndicator
# that tries to open an SMTP connection; with no SMTP host configured (the default) it reports DOWN, which
# drags the aggregate /actuator/health DOWN and fails the container HEALTHCHECK — so a deployment that never
# wanted email alerts would never become healthy. Even with SMTP set, a transient mail outage must not restart
# the gateway. So mail never gates health.
management.health.mail.enabled=false

# No database by default (in-memory tenant store). The 'postgres' profile re-enables these autoconfigs.
# Spring Boot 4 relocated these auto-configuration classes into their per-technology modules
# (spring-boot-jdbc, spring-boot-flyway), so the exclude list uses the new package names.
spring.autoconfigure.exclude=org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration,\
  org.springframework.boot.jdbc.autoconfigure.DataSourceTransactionManagerAutoConfiguration,\
  org.springframework.boot.flyway.autoconfigure.FlywayAutoConfiguration
