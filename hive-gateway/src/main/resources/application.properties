# The cloud control plane (dev defaults to localhost). Agents connect to ws://<host>:8090/agent;
# browsers/operators hit the REST API on the same port. Put TLS + auth + multi-tenancy in front of this.
server.address=127.0.0.1
server.port=8090
spring.application.name=hivekeeper-gateway
spring.mvc.async.request-timeout=120000

# The X-Tenant-Key service-principal path: a static key authenticates as its tenant's configured role (default
# owner). It is checked before any user JWT. Set false to accept ONLY user JWTs -- recommended for a hardened
# OIDC deployment so a leaked/static key cannot bypass per-user authorization.
hivekeeper.tenantkey.enabled=${HIVEKEEPER_TENANTKEY_ENABLED:true}

# No database by default (in-memory tenant store). The 'postgres' profile re-enables these autoconfigs.
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration,\
  org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
