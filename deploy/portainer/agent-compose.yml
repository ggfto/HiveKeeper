# The on-prem agent — run this on a machine INSIDE the network your access points are on, NOT on the host
# running docker-compose.portainer.yml.
#
#   1. cp agent.env.example .env   and fill it in (enrollment token, vault key, hostnames)
#   2. save ca.pem next to this file — copy it out of the pki-init container's log in Portainer
#   3. docker compose -f agent-compose.yml up -d
#
# Everything is configured by environment variable. The image ships its own /etc/hivekeeper/agent.conf and
# the environment overrides it (see hive-agent/agent.conf.example), so there is no config file to mount.
#
# The agent opens no inbound port. It dials OUT — to Cloudflare, not even to your server directly.

name: hivekeeper-agent

services:
  # The other end of the tunnel's `tcp://gateway:9443` ingress. `access tcp` is a raw byte pipe: the TLS
  # session runs end to end between the agent and the gateway, so the agent's CLIENT CERTIFICATE survives
  # the trip. An ordinary https:// ingress would terminate TLS at Cloudflare's edge and swallow it, and
  # every handshake and certificate renewal would fail closed.
  gateway-tunnel:
    image: cloudflare/cloudflared:${CLOUDFLARED_VERSION:-latest}
    # A PUBLIC resolver for THIS container. `access tcp` reaches the Access-fronted app by connecting to
    # https://<hostname> at the Cloudflare edge, so the sidecar MUST resolve ${HIVEKEEPER_AGENT_DOMAIN} to the
    # real public (Cloudflare) address. Crucially we do NOT give this container that name as a network alias:
    # an alias would be written into the sidecar's own /etc/hosts pointing at itself, and /etc/hosts wins over
    # any resolver — cloudflared would then dial itself on :443 ("connection refused ... originURL=https://…")
    # forever. Instead the sidecar gets a fixed IP (below) and the AGENT maps the name to that IP via its own
    # extra_hosts, so only the agent resolves the name to the sidecar; the sidecar resolves it publicly.
    dns:
      - 1.1.1.1
      - 1.0.0.1
    # cloudflared reads the hostname and local listener from $TUNNEL_SERVICE_HOSTNAME / $TUNNEL_SERVICE_URL, so
    # we pass them through the environment rather than as `command:` flags. This is not cosmetic: podman-compose
    # (unlike docker compose) does NOT interpolate ${VARS} inside a `command:` string — the literal
    # `${HIVEKEEPER_AGENT_DOMAIN}` then reaches cloudflared, which fails argument parsing and prints its help in a
    # restart loop. `environment:` values ARE interpolated by both engines, so this works on either.
    command: access tcp
    environment:
      TUNNEL_SERVICE_HOSTNAME: ${HIVEKEEPER_AGENT_DOMAIN:?set it}
      TUNNEL_SERVICE_URL: 0.0.0.0:9443
      # `access tcp` is a Zero Trust client, not a plain socket: it authenticates to the Cloudflare edge
      # before the edge will broker the stream to your tunnel. Protect the agent hostname with an Access
      # application whose policy is Action=Service Auth + a service token, and put the token here — without
      # one, cloudflared tries to open a BROWSER for interactive login, which never completes on a headless
      # agent and leaves the uplink permanently down.
      #
      # This is a second, independent credential in front of mTLS rather than a replacement for it.
      TUNNEL_SERVICE_TOKEN_ID: ${CF_ACCESS_CLIENT_ID:?set it — Zero Trust > Access > Service Auth}
      TUNNEL_SERVICE_TOKEN_SECRET: ${CF_ACCESS_CLIENT_SECRET:?set it}
    # Fixed IP so the agent's extra_hosts can point the gateway hostname here (no network alias — see the dns
    # note above for why an alias would poison this container's own resolution).
    networks:
      hknet:
        ipv4_address: 10.77.0.10
    restart: unless-stopped

  agent:
    image: ${HIVEKEEPER_REGISTRY:-ghcr.io/ggfto}/hivekeeper-agent:${HIVEKEEPER_TAG:?pin the same version as the gateway}
    environment:
      HIVEKEEPER_AGENT_ID: ${HIVEKEEPER_AGENT_ID:-hive-agent}

      # Both go through the sidecar. enrollment.url must NOT point at the public console URL: renewal is
      # authenticated by the agent's current client certificate, so it has to reach the gateway
      # unterminated — through this same tcp pipe — or it fails with 401 once the first certificate nears
      # expiry, months after everything appeared to work.
      HIVEKEEPER_GATEWAY_URL: wss://${HIVEKEEPER_AGENT_DOMAIN:?set it}:9443/agent
      HIVEKEEPER_ENROLLMENT_URL: https://${HIVEKEEPER_AGENT_DOMAIN:?set it}:9443
      # The gateway's certificate on 9443 is issued by HiveKeeper's private CA, which the JVM has no reason
      # to trust. Note this REPLACES the default trust store rather than adding to it.
      HIVEKEEPER_ENROLLMENT_CACERT: /etc/hivekeeper/ca.pem
      # One-time, from the console: Fleet -> Agents -> Enroll. Spent on first use; after that the agent
      # renews over mTLS with no token.
      HIVEKEEPER_ENROLLMENT_TOKEN: ${HIVEKEEPER_ENROLLMENT_TOKEN:-}

      # These four MUST be redirected into /data. The image's defaults put them under /var/lib/hivekeeper,
      # which is not a volume — leave them and the agent loses its identity, its pinned SSH host keys and
      # its credential vault on every container recreate, then silently re-enrols as a stranger.
      HIVEKEEPER_TLS_KEYSTORE: /data/agent.p12
      HIVEKEEPER_TLS_KEYSTORE_PASSWORD: ${HIVEKEEPER_AGENT_STORE_PASSWORD:?set it — openssl rand -hex 24}
      HIVEKEEPER_TLS_TRUSTSTORE: /data/truststore.p12
      HIVEKEEPER_TLS_TRUSTSTORE_PASSWORD: ${HIVEKEEPER_AGENT_STORE_PASSWORD:?set it}
      HIVEKEEPER_CREDENTIAL_VAULT: /data/vault.properties
      HIVEKEEPER_KNOWN_HOSTS: /data/known_hosts

      # base64 AES-256 key (openssl rand -base64 32) encrypting the vault AT REST. Without it the vault is
      # written in plaintext. Losing it loses the vault: back it up somewhere other than this machine.
      HIVEKEEPER_VAULT_KEY: ${HIVEKEEPER_VAULT_KEY:-}

      # Fleet-wide fallback SSH credentials, used only when a device has no vault entry. They are resolved
      # HERE and never leave this machine — the gateway only ever sends a reference.
      HIVEKEEPER_DEFAULT_USER: ${HIVEKEEPER_DEFAULT_USER:-admin}
      HIVEKEEPER_DEFAULT_PASSWORD: ${HIVEKEEPER_DEFAULT_PASSWORD:-}

      # tofu (default) pins an AP's host key on first sight and refuses a changed one. accept-all disables
      # verification entirely — a lab escape hatch, never production.
      HIVEKEEPER_SSH_HOSTKEY: ${HIVEKEEPER_SSH_HOSTKEY:-tofu}

      # On shutdown the agent lets an in-flight job finish (and report) before exiting, so an update restart
      # never interrupts a running job and makes the gateway redeliver it. This is that window.
      HIVEKEEPER_SHUTDOWN_DRAIN_SECONDS: ${HIVEKEEPER_SHUTDOWN_DRAIN_SECONDS:-30}
    labels:
      # The updater below only touches containers carrying this label — so it can never disturb anything else
      # running on this machine, only the agent.
      com.centurylinklabs.watchtower.enable: "true"
    # Give the drain time to finish before the runtime SIGKILLs the container. Must exceed the drain window.
    stop_grace_period: ${HIVEKEEPER_SHUTDOWN_GRACE:-45s}
    volumes:
      # BACK THIS UP. It holds the agent's identity, the credential vault, the pinned SSH host keys, and the
      # git history of every device config — which is your rollback path.
      - agent-data:/data
      # The CA certificate. Public, not a secret; copy it from the pki-init container's log in Portainer.
      - ./ca.pem:/etc/hivekeeper/ca.pem:ro
    depends_on:
      - gateway-tunnel
    # Only the agent maps the gateway hostname to the sidecar (via the sidecar's fixed IP). Keeping this out of a
    # shared network alias is what lets the sidecar resolve the SAME name publicly for its Cloudflare egress (see
    # gateway-tunnel above). The name must equal the gateway certificate's SAN — the agent verifies it
    # (Java-WebSocket sets endpointIdentificationAlgorithm=HTTPS), which is the whole reason it dials the hostname
    # rather than an IP.
    extra_hosts:
      - "${HIVEKEEPER_AGENT_DOMAIN:?set it}:10.77.0.10"
    networks:
      - hknet
    restart: unless-stopped

  # Automatic agent updates — OPT-IN. Starts only with `--profile autoupdate`, and even then it updates the
  # agent only when the agent's image TAG moves. Pin HIVEKEEPER_TAG to a version and this never fires; point it
  # at a moving tag (`latest`, or a channel you promote in step with the gateway) and the agent follows.
  #
  #   docker compose -f agent-compose.yml --profile autoupdate up -d
  #
  # It watches ONLY the label above, so it will not touch the tunnel sidecar, itself, or anything else on the
  # box. When it does update, it stops the agent with SIGTERM and waits — the agent drains its current job and
  # reports it before exiting, so the swap is safe mid-job (that is what stop_grace_period + the drain window
  # buy you). The gateway then redelivers nothing, because the job already finished.
  #
  # PODMAN: Watchtower speaks the Docker API. Enable Podman's Docker-compatible socket
  # (`systemctl --user enable --now podman.socket`) and set CONTAINER_SOCK to it, e.g.
  #   CONTAINER_SOCK=${XDG_RUNTIME_DIR}/podman/podman.sock
  agent-updater:
    image: containrrr/watchtower:${WATCHTOWER_VERSION:-latest}
    profiles: [autoupdate]
    # The interval rides in the environment (WATCHTOWER_POLL_INTERVAL), not on `command:`, because podman-compose
    # does not interpolate ${VARS} inside a command string — see the note on gateway-tunnel above.
    command: --label-enable --cleanup
    environment:
      WATCHTOWER_POLL_INTERVAL: ${HIVEKEEPER_UPDATE_INTERVAL_SECONDS:-3600}
      # Wait at least as long as the agent's stop grace period, so Watchtower does not SIGKILL mid-drain.
      WATCHTOWER_TIMEOUT: ${HIVEKEEPER_SHUTDOWN_GRACE:-45s}
    volumes:
      - ${CONTAINER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock
    restart: unless-stopped

# A dedicated network with a fixed subnet so the sidecar can hold a stable IP (10.77.0.10) that the agent's
# extra_hosts points at. The subnet is arbitrary but must not collide with the LAN the APs live on.
networks:
  hknet:
    ipam:
      config:
        - subnet: 10.77.0.0/24

volumes:
  agent-data:
