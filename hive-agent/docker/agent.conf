# The agent's IN-IMAGE defaults — only the settings whose sensible value differs inside a container.
#
# These live in a file, not in Dockerfile ENV lines, and that is deliberate: the environment OVERRIDES the
# config file (12-factor), so a baked-in `ENV HIVEKEEPER_GATEWAY_URL=...` would silently win over the
# agent.conf an operator bind-mounts — beating them at the one setting they most need to control.
#
# To configure a real deployment, bind-mount your own file over this one:
#   -v /srv/hivekeeper/agent.conf:/etc/hivekeeper/agent.conf:ro
# ...or keep using environment variables, which still take precedence over both.
#
# See hive-agent/agent.conf.example for the full, commented set of settings.

# The compose stack's gateway, reachable by service name. A real deployment points this at its own gateway
# over wss:// — HiveKeeper is self-hosted and has no idea where yours is.
gateway.url = ws://gateway:8090/agent

# Container paths. /data is a volume: it holds the config backups (your rollback path), and — once you set
# credential.vault / known.hosts — the credential vault and pinned SSH host keys too.
backup.dir = /data/backups

# Watched by the image's HEALTHCHECK. The agent touches it while its gateway uplink is up and removes it when
# the uplink drops, so "healthy" means connected, not merely running.
health.file = /tmp/hivekeeper-agent.health
